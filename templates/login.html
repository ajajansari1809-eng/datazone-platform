<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - Data Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0f172a; height: 100vh; display: flex; justify-content: center; align-items: center; color: #f1f5f9; }
        
        .login-container { background: #1e293b; border: 1px solid #334155; padding: 40px; border-radius: 12px; width: 100%; max-width: 420px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .brand-header { text-align: center; margin-bottom: 25px; }
        .brand-header h1 { font-size: 2rem; color: #38bdf8; font-weight: 700; }
        .brand-header p { color: #64748b; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .tab-headers { display: flex; border-bottom: 2px solid #334155; margin-bottom: 25px; cursor: pointer; }
        .tab-link { flex: 1; text-align: center; padding: 10px 0; font-weight: 600; color: #64748b; }
        .tab-link.active { color: #38bdf8; border-bottom: 2px solid #38bdf8; margin-bottom: -2px; }

        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group { position: relative; margin-bottom: 20px; }
        .form-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #38bdf8; opacity: 0.7; }
        .form-control { width: 100%; padding: 12px 15px 12px 45px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 0.95rem; outline: none; }
        
        .otp-wrapper { display: flex; gap: 10px; }
        .btn-otp { background: #334155; border: 1px solid #475569; padding: 0 15px; border-radius: 8px; color: #fff; font-size: 0.85rem; font-weight: 600; cursor: pointer; }

        .btn-login { width: 100%; padding: 12px; background: #0284c7; border: none; border-radius: 8px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .alert-error { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #f87171; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-header">
            <h1>DATA ZONE</h1>
            <p>Authentication Gateway</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert-error"><i class="fa-solid fa-circle-exclamation"></i> {{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <div id="ajax-alert" style="display:none; padding:12px; border-radius:8px; margin-bottom:20px; font-size:0.9rem; font-weight:500;"></div>

        <div class="tab-headers">
            <div class="tab-link active" onclick="toggleAuthTab('signin-tab')">Sign In</div>
            <div class="tab-link" onclick="toggleAuthTab('signup-tab')">Sign Up (100 Free Cr)</div>
        </div>

        <form id="signin-tab" class="auth-form active" action="/login" method="POST">
            <div class="form-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="username" class="form-control" placeholder="Username / ID" required>
            </div>
            <div class="form-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-login">Secure Sign In</button>
        </form>

        <form id="signup-tab" class="auth-form" action="/process-signup" method="POST">
            <div class="form-group">
                <i class="fa-solid fa-signature"></i>
                <input type="text" name="name" class="form-control" placeholder="Username / Name" required autocomplete="off">
            </div>
            <div class="form-group">
                <i class="fa-solid fa-mobile-screen"></i>
                <div class="otp-wrapper">
                    <input type="text" id="signup-mobile" name="mobile" class="form-control" placeholder="Mobile Number" required autocomplete="off">
                    <button type="button" class="btn-otp" onclick="triggerOtpRequest()">Send OTP</button>
                </div>
            </div>
            <div class="form-group">
                <i class="fa-solid fa-key"></i>
                <input type="text" name="otp" class="form-control" placeholder="Enter 6-Digit OTP" required autocomplete="off">
            </div>
            <button type="submit" class="btn-login" style="background:#16a34a;">Verify & Register</button>
        </form>
    </div>

    <script>
        function toggleAuthTab(formId) {
            document.querySelectorAll('.tab-link').forEach(link => link.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            document.getElementById(formId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function triggerOtpRequest() {
            const mobileInput = document.getElementById('signup-mobile').value;
            const alertBox = document.getElementById('ajax-alert');
            
            if(!mobileInput || mobileInput.length < 10) {
                alertBox.style.display = 'block';
                alertBox.style.background = 'rgba(239, 68, 68, 0.1)';
                alertBox.style.border = '1px solid #ef4444';
                alertBox.style.color = '#f87171';
                alertBox.innerHTML = 'Enter a valid 10-digit mobile number!';
                return;
            }

            const formData = new FormData();
            formData.append('mobile', mobileInput);

            fetch('/send-otp', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                alertBox.style.display = 'block';
                if(data.status === 'success') {
                    alertBox.style.background = 'rgba(22, 163, 74, 0.15)';
                    alertBox.style.border = '1px solid #16a34a';
                    alertBox.style.color = '#4ade80';
                    alertBox.innerHTML = data.message;
                }
            });
        }
    </script>
</body>
</html>
