<!DOCTYPE html>
<html>
<head>
    <title>Register - Lead Platform</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">
    <div class="card mx-auto p-4 shadow" style="width: 400px;">
        <h3 class="text-center mb-3">📝 New User Signup</h3>
        {% with messages = get_flashed_messages() %}{% if messages %}
            <div class="alert alert-warning p-2 text-center">{{ messages[0] }}</div>
        {% endif %}{% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Create Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Create Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold">Register</button>
        </form>
        <p class="text-center mt-3 mb-0">Already have an account? <a href="/login" class="fw-bold">Login</a></p>
    </div>
</body>
</html>
